<div class="page-wrapper">
  <div class="auth-card">
    <!-- Left: Branding Panel -->

    <!-- Right: Form Panel -->
    <div class="form-panel">
      <div class="form-header">
        <h2>Welcome Back</h2>
        <p>Please enter your credentials to access the dashboard.</p>
      </div>

      <div class="form-group">
        <label for="email">Work Email</label>
        <div class="input-icon-wrap">
          <span class="material-symbols-outlined input-icon-left">mail</span>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="name@university.edu"
          />
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Password</label>
          <a class="forgot-link" routerLink="/forgot-password">Forgot?</a>
        </div>
        <div class="input-icon-wrap">
          <span class="material-symbols-outlined input-icon-left">lock_person</span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••••••"
          />
        </div>
      </div>

      @if (errorMessage) {
        <div class="error-alert">{{ errorMessage }}</div>
      }

      <button class="btn-primary" (click)="onLogin()">
        Sign In to Dashboard
        <span class="material-symbols-outlined">arrow_forward</span>
      </button>
    </div>
  </div>
</div>
