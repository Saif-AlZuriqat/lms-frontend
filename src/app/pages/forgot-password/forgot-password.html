<div class="page-wrapper">
  <div class="auth-card">
    <div class="form-panel">
      <div class="form-header">
        <h2>Reset Password</h2>
        <p>Provide the email address associated with your account.</p>
      </div>

      <div class="form-group">
        <label for="email">Work Email</label>
        <div class="input-icon-wrap">
          <span class="material-symbols-outlined input-icon-left">mail</span>
          <input id="email" type="email" [(ngModel)]="email"
            name="email" placeholder="name@university.edu" />
        </div>
      </div>

      @if (errorMessage) {
        <div class="error-alert">{{ errorMessage }}</div>
      }

      @if (successMessage) {
        <div class="success-alert">{{ successMessage }}</div>
      }

      <button class="btn-primary" (click)="onForgot()" [disabled]="isLoading">
        @if (isLoading) {
          <span>Sending...</span>
        } @else {
          <span>Send Reset Link</span>
          <span class="material-symbols-outlined">send</span>
        }
      </button>

      <div class="divider"><span>Remembered it?</span></div>
      <a routerLink="/" class="btn-secondary">Back to Login</a>
    </div>
  </div>
</div>
