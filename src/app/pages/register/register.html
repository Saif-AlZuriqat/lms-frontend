<div class="register-container">
  <div class="register-card">
    <h2>Register</h2>
    <p class="subtitle">Create your account</p>

    @if (errorMessage) {
      <p style="color: red; text-align: center;">{{ errorMessage }}</p>
    }
    @if (successMessage) {
      <p style="color: green; text-align: center;">{{ successMessage }}</p>
    }

    <div class="form-group">
      <label>Username</label>
      <input [(ngModel)]="userName" name="userName" placeholder="Enter your username" />
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <input [(ngModel)]="fullName" name="fullName" placeholder="Enter your full name" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm your password" />
    </div>

    <button (click)="onRegister()">Register</button>

    <div class="login-link">
      Already have an account? <a routerLink="/">Login</a>
    </div>
  </div>
</div>
