<div class="continue-card">
  <div class="continue-visual">
    <div class="course-icon-wrap">
      <span class="material-symbols-outlined">play_circle</span>
    </div>
    <div class="play-ring"></div>
  </div>
  <div class="continue-info">
    <span class="continue-badge">Last Accessed</span>
    <h3>{{ lastCourse.title }}</h3>
    <div class="progress-row">
      <div class="progress-bar">
        <div class="progress-fill" [style.width.%]="lastCourse.progress"></div>
      </div>
      <span class="progress-pct">{{ lastCourse.progress }}%</span>
    </div>
    <p class="continue-hint">Pick up where you left off</p>
  </div>
  <button class="btn-resume">
    <span class="material-symbols-outlined">play_arrow</span>
    Resume
  </button>
</div>
