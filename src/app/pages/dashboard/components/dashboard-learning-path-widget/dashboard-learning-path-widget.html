<section class="section-card">
  <div class="section-header">
    <span class="material-symbols-outlined">route</span>
    <h2>My Learning Path</h2>
  </div>
  <div class="path-card">
    <div class="path-title">{{ learningPath.title }}</div>
    <p class="path-desc">{{ learningPath.description }}</p>
    <div class="path-progress-label">
      <span>Progress</span>
      <span>{{ learningPath.completed }}/{{ learningPath.total }} modules</span>
    </div>
    <div class="progress-bar large">
      <div class="progress-fill green" [style.width.%]="(learningPath.completed / learningPath.total) * 100"></div>
    </div>
    @for (step of learningPath.steps; track step.name) {
      <div class="path-step" [class.done]="step.done">
        <span class="material-symbols-outlined">{{ step.done ? 'check_circle' : 'radio_button_unchecked' }}</span>
        {{ step.name }}
      </div>
    }
  </div>
</section>
