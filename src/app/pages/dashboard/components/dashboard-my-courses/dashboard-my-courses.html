<div class="courses-grid">
  @for (course of courses; track course.id) {
    <div class="course-card">
      <!-- Banner area with gradient -->
      <div [class]="'course-banner banner-' + course.color">
        <span class="material-symbols-outlined course-icon-lg">{{ course.icon }}</span>
        <div class="banner-shine"></div>
      </div>
      <!-- Card body -->
      <div class="course-body">
        <h4>{{ course.title }}</h4>
        <div class="progress-row">
          <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="course.progress"></div>
          </div>
          <span class="progress-pct">{{ course.progress }}%</span>
        </div>
        <div class="course-footer">
          <span class="course-status">{{ course.progress === 100 ? 'Completed' : course.progress > 0 ? 'In Progress' : 'Not Started' }}</span>
          <button class="btn-continue">Continue</button>
        </div>
      </div>
    </div>
  }
</div>
